apiVersion: v1
kind: LimitRange
metadata:
  name: student-limits
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    max:
      cpu: "1"
      memory: 2Gi
    min:
      cpu: 10m
      memory: 32Mi
    type: Container
  - max:
      storage: 5Gi
    min:
      storage: 1Gi
    type: PersistentVolumeClaim
