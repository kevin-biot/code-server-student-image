# VERSIONS.yaml - Single source of truth for all tool and image versions
# Update versions here, then rebuild images.

# Base image
codeServer: "4.109.2"

# Tool pack versions
tools:
  kubectl: "stable"           # Tracks latest stable via dl.k8s.io
  oc: "stable"                # Tracks latest stable via mirror.openshift.com
  helm: "latest"              # Installed via get-helm-3 script
  argocd: "2.13.3"
  tkn: "0.42.0"
  pulumi: "latest"            # Installed via get.pulumi.com
  yq: "4.45.4"

# Language runtimes (tool-pack base images)
runtimes:
  java: "17"                  # eclipse-temurin:17-jdk-jammy
  nodejs: "20"                # node:20-slim
  python: "3.12"              # python:3.12-slim

# Builder images
builders:
  debian: "bookworm-slim"
  busybox: "stable"

# OpenShift deployment
deployment:
  imageTag: "v1.0.0"
  storageClass: "gp3-csi"
